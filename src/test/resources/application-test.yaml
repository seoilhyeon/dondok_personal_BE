spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dondok-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  flyway:
    enabled: false

app:
  jwt:
    issuer: dondok-test
    access-token-expiration: 30m
    refresh-token-expiration: 7d
    secret: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  aws:
    s3:
      bucket: dondok-test-bucket
      base-prefix:
      healthcheck-key: healthcheck/s3-readiness
      healthcheck-timeout: 3s
