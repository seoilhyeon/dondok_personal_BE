spring:
  jpa:
    hibernate:
      ddl-auto: create-drop

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  flyway:
    enabled: false

app:
  jwt:
    issuer: dondok-test
    access-token-expiration: 30m
    refresh-token-expiration: 7d
    secret: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  oauth2:
    success-redirect-uri: http://localhost:3000/oauth2/success
    failure-redirect-uri: http://localhost:3000/oauth2/failure
  aws:
    s3:
      bucket: dondok-test-bucket
      base-prefix:
      healthcheck-key: healthcheck/s3-readiness
      healthcheck-timeout: 3s
