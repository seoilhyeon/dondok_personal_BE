logging:
  level:
    com.oit.dondok: debug

spring:
  datasource:
    driver-class-name: ${DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    show-sql: false

management:
  endpoint:
    health:
      show-details: when_authorized

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:dondok-dev-bucket}
      base-prefix: ${AWS_S3_BASE_PREFIX:}
      healthcheck-key: ${AWS_S3_HEALTHCHECK_KEY:healthcheck/s3-readiness}
      healthcheck-timeout: ${AWS_S3_HEALTHCHECK_TIMEOUT:3s}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
