logging:
  level:
    com.oit.dondok: debug
    org.springframework.web.servlet: debug
    org.hibernate.orm.jdbc.bind: trace

spring:
  datasource:
    driver-class-name: ${DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dondok?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${MYSQL_USER:dondok}
    password: ${MYSQL_PASSWORD:dondok}
  cloud:
    aws:
      s3:
        bucket: dondok-bucket
        endpoint: http://localhost:4566
        # LocalStack은 path-style(http://localhost:4566/dondok-bucket/...)이 표준이다.
        # 끄면 presigned URL이 virtual-host(http://dondok-bucket.localhost:4566/...)로 발급되어
        # 브라우저 직접 업로드 시 호스트 라우팅/CORS가 깨진다.
        path-style-access-enabled: true
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: http://localhost:3000
  cookie:
    secure: false
    same-site: Lax
  aws:
    s3:
      bucket: dondok-bucket
      base-prefix:
      healthcheck-key: healthcheck/s3-readiness
      healthcheck-timeout: 3s
