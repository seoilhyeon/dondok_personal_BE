spring:
  application:
    name: dondok

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        # Canonical server time authority for point_history.created_at etc. is Asia/Seoul (KST).
        jdbc:
          time_zone: Asia/Seoul

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}

  jwt:
    issuer: ${JWT_ISSUER:dondok}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}
    secret: ${JWT_SECRET}

  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:}
      healthcheck-key: ${AWS_S3_HEALTHCHECK_KEY:healthcheck/s3-readiness}
      healthcheck-timeout: ${AWS_S3_HEALTHCHECK_TIMEOUT:3s}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL_NAME:gpt-4.1-mini}
