global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dondok-api-blue
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - api-blue:8080
        labels:
          slot: blue

  - job_name: dondok-api-green
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - api-green:8080
        labels:
          slot: green
