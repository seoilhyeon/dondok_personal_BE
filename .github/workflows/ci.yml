name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Format, static analysis, and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Run quality gate
        run: ./gradlew spotlessCheck checkstyleMain checkstyleTest test --no-daemon

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSL -O "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --no-git --redact --verbose

  dependency-check:
    name: OWASP dependency check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-home-cache-includes: |
            caches
            notifications
            dependency-check-data

      - name: Validate NVD API key
        id: nvd
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            if [ "${EVENT_NAME}" = "push" ]; then
              echo "::error::NVD_API_KEY is required on push."
              exit 1
            fi
            echo "::warning::NVD_API_KEY is not configured; skipping OWASP Dependency Check."
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl_exit=0
          http_status=$(curl -sS -o /tmp/nvd-response.json -w "%{http_code}" \
            -H "apiKey: ${NVD_API_KEY}" \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=1") || curl_exit=$?

          if [ "${curl_exit}" -ne 0 ]; then
            if [ "${EVENT_NAME}" = "push" ]; then
              echo "::error::NVD API request failed on push (curl exit ${curl_exit})."
              exit 1
            fi
            echo "::warning::NVD API request failed (curl exit ${curl_exit}); skipping OWASP Dependency Check."
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${http_status}" = "200" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          else
            if [ "${EVENT_NAME}" = "push" ]; then
              echo "::error::NVD API key is invalid or NVD API is unavailable (HTTP ${http_status}) on push."
              exit 1
            fi
            echo "::warning::NVD_API_KEY is invalid or NVD API is unavailable (HTTP ${http_status}); skipping OWASP Dependency Check."
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OWASP Dependency Check
        if: steps.nvd.outputs.run_scan == 'true'
        run: >
          ./gradlew
          -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
          dependencyCheckAnalyze
          --no-daemon
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        if: always() && steps.nvd.outputs.run_scan == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.*
