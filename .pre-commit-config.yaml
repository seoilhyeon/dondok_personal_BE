repos:
  - repo: local
    hooks:
      - id: spotless-check
        name: Spotless Java format check
        entry: gradlew.bat spotlessCheck --no-daemon
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: gitleaks
        name: Gitleaks secret scan
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: backend-tests
        name: Backend tests
        entry: gradlew.bat test --no-daemon
        language: system
        pass_filenames: false
        stages: [pre-push]
